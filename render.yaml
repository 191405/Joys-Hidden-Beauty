# ============================================
# JOYSHIDDENBEAUTY — Render Blueprint (IaC)
# Render reads this file to auto-provision services.
# Docs: https://docs.render.com/blueprint-spec
# ============================================

databases:
  - name: joyshiddenbeauty-db
    plan: free
    databaseName: joyshiddenbeauty
    user: joyshiddenbeauty_user
    region: frankfurt  # Closest to West Africa (Nigeria)

services:
  - type: web
    name: joyshiddenbeauty-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m scripts.seed_initial_data
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: joyshiddenbeauty-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        sync: false  # You will set this manually after Vercel deploys
      - key: OPAY_PUBLIC_KEY
        sync: false
      - key: OPAY_SECRET_KEY
        sync: false
      - key: OPAY_MERCHANT_ID
        sync: false
      - key: OPAY_BASE_URL
        value: https://api.opaycheckout.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_EMAIL
        value: joyshiddenbeauty1@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        value: joyshiddenbeauty1@gmail.com
      - key: PYTHON_VERSION
        value: "3.11.9"
